name: BinderLab verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Publish pending standalone status
        if: ${{ github.event_name == 'push' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $headers = @{
            Accept = "application/vnd.github+json"
            Authorization = "Bearer $env:GH_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $body = @{
            state = "pending"
            target_url = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            description = "BinderLab standalone verification is running"
            context = "binderlab/standalone-verification"
          } | ConvertTo-Json
          Invoke-RestMethod `
            -Method Post `
            -Uri "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" `
            -Headers $headers `
            -Body $body `
            -ContentType "application/json" | Out-Null

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Android 16 QPR2 toolchain
        shell: pwsh
        run: |
          $sdkRoot = if ($env:ANDROID_SDK_ROOT) {
            $env:ANDROID_SDK_ROOT
          } else {
            $env:ANDROID_HOME
          }
          if (-not $sdkRoot) {
            throw "ANDROID_SDK_ROOT and ANDROID_HOME are both empty"
          }
          $sdkManager = Get-ChildItem `
            -LiteralPath (Join-Path $sdkRoot "cmdline-tools") `
            -Recurse `
            -Filter sdkmanager.bat | Select-Object -First 1
          if (-not $sdkManager) {
            throw "sdkmanager.bat was not found under $sdkRoot"
          }
          $answers = 1..20 | ForEach-Object { "y" }
          $answers | & $sdkManager.FullName `
            --sdk_root=$sdkRoot `
            "platforms;android-36.1" `
            "build-tools;36.0.0"
          if ($LASTEXITCODE -ne 0) {
            throw "Android SDK package installation failed"
          }
          "ANDROID_SDK_ROOT=$sdkRoot" >> $env:GITHUB_ENV

      - name: Build and verify BinderLab
        shell: pwsh
        run: |
          $verifyArgs = @{
            SdkRoot = $env:ANDROID_SDK_ROOT
            CompileSdkPlatform = "36.1"
            BuildToolsVersion = "36.0.0"
          }
          if ("${{ github.event_name }}" -eq "push") {
            $before = "${{ github.event.before }}"
            if ($before -notmatch "^0{40}$") {
              & git cat-file -e "${before}^{commit}" 2>$null
              if ($LASTEXITCODE -eq 0) {
                $verifyArgs.DiffBase = "${{ github.event.before }}"
              } else {
                Write-Host "Push base $before is unavailable after history rewrite; validating current HEAD."
              }
            }
          }
          .\verify.ps1 @verifyArgs

      - name: Validate and describe commit-bound artifacts
        shell: pwsh
        run: |
          $source = @{}
          foreach ($line in Get-Content -LiteralPath .\evidence\source.txt -Encoding UTF8) {
            if ($line -match '^(?<key>[A-Za-z][A-Za-z0-9]*)=(?<value>.*)$') {
              $source[$Matches.key] = $Matches.value
            }
          }
          foreach ($requiredKey in @('gitCommit', 'captureId', 'apkSha256')) {
            if (-not $source.ContainsKey($requiredKey)) {
              throw "evidence/source.txt is missing $requiredKey"
            }
          }
          .\write-verification-artifacts.ps1 `
            -ProducerRepository "${{ github.repository }}" `
            -ProducerCommit "${{ github.sha }}" `
            -BinderLabTag "unreleased" `
            -BinderLabCommit "${{ github.sha }}" `
            -EvidenceSourceCommit $source.gitCommit `
            -CaptureId $source.captureId `
            -EvidenceApkSha256 $source.apkSha256 `
            -WorkflowRunId "${{ github.run_id }}" `
            -WorkflowRunAttempt "${{ github.run_attempt }}"

      - name: Upload commit-bound reproducibility artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: BinderLab-api36.1-${{ github.sha }}-verification
          if-no-files-found: error
          path: |
            build/BinderLab-debug.apk
            build/apk-badging.txt
            build/toolchain.txt
            build/evidence-replay-report.json
            build/generated/com/example/binderdemo/IAsyncWorker.java
            build/generated/com/example/binderdemo/ICalculator.java
            build/generated/com/example/binderdemo/IResultCallback.java
            build/generated/com/example/binderdemo/ISyncResultCallback.java
            build/verification-provenance.txt
            build/artifact-manifest.sha256

      - name: Publish final standalone status
        if: ${{ always() && github.event_name == 'push' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          $state = switch ($env:JOB_STATUS) {
            "success" { "success" }
            "cancelled" { "error" }
            default { "failure" }
          }
          $description = switch ($state) {
            "success" { "SDK 36.1, evidence replay, build, and artifacts passed" }
            "error" { "BinderLab standalone verification was cancelled" }
            default { "BinderLab standalone verification failed" }
          }
          $headers = @{
            Accept = "application/vnd.github+json"
            Authorization = "Bearer $env:GH_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $body = @{
            state = $state
            target_url = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            description = $description
            context = "binderlab/standalone-verification"
          } | ConvertTo-Json
          $status = Invoke-RestMethod `
            -Method Post `
            -Uri "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" `
            -Headers $headers `
            -Body $body `
            -ContentType "application/json"
          if ($status.state -ne $state -or
              $status.context -ne "binderlab/standalone-verification") {
            throw "GitHub did not persist the expected standalone status"
          }
