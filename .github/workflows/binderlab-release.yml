name: BinderLab release

on:
  workflow_dispatch:
    inputs:
      releaseTag:
        description: Versioned annotated tag that publication policy forbids moving
        required: true
        type: string
      releaseCommit:
        description: Full BinderLab commit already verified on main
        required: true
        type: string

permissions:
  contents: write
  statuses: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Validate release inputs
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.releaseTag }}
          RELEASE_COMMIT: ${{ inputs.releaseCommit }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^android16-qpr2-evidence-v[0-9]+(?:\.[0-9]+)*$') {
            throw "Release tag has an invalid format: $env:RELEASE_TAG"
          }
          if ($env:RELEASE_COMMIT -notmatch '^[0-9a-f]{40}$') {
            throw "Release commit must be a full lowercase commit id"
          }
          & git cat-file -e "$env:RELEASE_COMMIT^{commit}"
          if ($LASTEXITCODE -ne 0) {
            throw "Release commit is unavailable: $env:RELEASE_COMMIT"
          }
          & git merge-base --is-ancestor $env:RELEASE_COMMIT origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Release commit must already be reachable from origin/main"
          }
          $notesPath = Join-Path "releases" "$env:RELEASE_TAG.md"
          if (-not (Test-Path -LiteralPath $notesPath -PathType Leaf)) {
            throw "Release notes are missing: $notesPath"
          }

      - name: Publish pending release status
        id: pending
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ inputs.releaseCommit }}
        run: |
          $headers = @{
            Accept = "application/vnd.github+json"
            Authorization = "Bearer $env:GH_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $body = @{
            state = "pending"
            target_url = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            description = "BinderLab tag-bound release verification is running"
            context = "binderlab/release-verification"
          } | ConvertTo-Json
          Invoke-RestMethod `
            -Method Post `
            -Uri "https://api.github.com/repos/${{ github.repository }}/statuses/$env:RELEASE_COMMIT" `
            -Headers $headers `
            -Body $body `
            -ContentType "application/json" | Out-Null

      - name: Require successful standalone verification
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ inputs.releaseCommit }}
        run: |
          $headers = @{
            Accept = "application/vnd.github+json"
            Authorization = "Bearer $env:GH_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $statuses = Invoke-RestMethod `
            -Method Get `
            -Uri "https://api.github.com/repos/${{ github.repository }}/commits/$env:RELEASE_COMMIT/status" `
            -Headers $headers
          $standalone = @($statuses.statuses | Where-Object {
              $_.context -eq "binderlab/standalone-verification"
            } | Select-Object -First 1)
          if ($standalone.Count -ne 1 -or $standalone[0].state -ne "success") {
            throw "Release commit has no successful binderlab/standalone-verification status"
          }

      - name: Checkout verified release commit
        shell: pwsh
        env:
          RELEASE_COMMIT: ${{ inputs.releaseCommit }}
        run: |
          & git checkout --detach $env:RELEASE_COMMIT
          if ($LASTEXITCODE -ne 0 -or (& git rev-parse HEAD).Trim() -ne $env:RELEASE_COMMIT) {
            throw "Could not check out the verified release commit"
          }

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Android 16 QPR2 toolchain
        shell: pwsh
        run: |
          $sdkRoot = if ($env:ANDROID_SDK_ROOT) {
            $env:ANDROID_SDK_ROOT
          } else {
            $env:ANDROID_HOME
          }
          if (-not $sdkRoot) {
            throw "ANDROID_SDK_ROOT and ANDROID_HOME are both empty"
          }
          $sdkManager = Get-ChildItem `
            -LiteralPath (Join-Path $sdkRoot "cmdline-tools") `
            -Recurse `
            -Filter sdkmanager.bat | Select-Object -First 1
          if (-not $sdkManager) {
            throw "sdkmanager.bat was not found under $sdkRoot"
          }
          $answers = 1..20 | ForEach-Object { "y" }
          $answers | & $sdkManager.FullName `
            --sdk_root=$sdkRoot `
            "platforms;android-36.1" `
            "build-tools;36.0.0"
          if ($LASTEXITCODE -ne 0) {
            throw "Android SDK package installation failed"
          }
          "ANDROID_SDK_ROOT=$sdkRoot" >> $env:GITHUB_ENV

      - name: Rebuild and verify the release commit
        shell: pwsh
        run: |
          .\verify.ps1 `
            -SdkRoot $env:ANDROID_SDK_ROOT `
            -CompileSdkPlatform "36.1" `
            -BuildToolsVersion "36.0.0"

      - name: Generate release-bound artifacts
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.releaseTag }}
          RELEASE_COMMIT: ${{ inputs.releaseCommit }}
        run: |
          $source = @{}
          foreach ($line in Get-Content -LiteralPath .\evidence\source.txt -Encoding UTF8) {
            if ($line -match '^(?<key>[A-Za-z][A-Za-z0-9]*)=(?<value>.*)$') {
              $source[$Matches.key] = $Matches.value
            }
          }
          foreach ($requiredKey in @('gitCommit', 'captureId', 'apkSha256')) {
            if (-not $source.ContainsKey($requiredKey)) {
              throw "evidence/source.txt is missing $requiredKey"
            }
          }
          .\write-verification-artifacts.ps1 `
            -ProducerRepository "${{ github.repository }}" `
            -ProducerCommit $env:RELEASE_COMMIT `
            -BinderLabTag $env:RELEASE_TAG `
            -BinderLabCommit $env:RELEASE_COMMIT `
            -EvidenceSourceCommit $source.gitCommit `
            -CaptureId $source.captureId `
            -EvidenceApkSha256 $source.apkSha256 `
            -WorkflowRunId "${{ github.run_id }}" `
            -WorkflowRunAttempt "${{ github.run_attempt }}"

      - name: Stage durable release assets
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.releaseTag }}
        run: |
          if ($env:RELEASE_TAG -notmatch '-(?<version>v[0-9]+(?:\.[0-9]+)*)$') {
            throw "Could not derive the release version from $env:RELEASE_TAG"
          }
          $releaseVersion = $Matches.version
          $releaseRoot = Join-Path $PWD "build\release"
          $packageRoot = Join-Path $releaseRoot "package"
          if (Test-Path -LiteralPath $releaseRoot) {
            Remove-Item -LiteralPath $releaseRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $packageRoot -Force | Out-Null

          $packageFiles = @(
            @{ Source = "build\BinderLab-debug.apk"; Target = "BinderLab-debug.apk" },
            @{ Source = "build\apk-badging.txt"; Target = "apk-badging.txt" },
            @{ Source = "build\toolchain.txt"; Target = "toolchain.txt" },
            @{ Source = "build\evidence-replay-report.json"; Target = "evidence-replay-report.json" },
            @{ Source = "build\generated\com\example\binderdemo\IAsyncWorker.java"; Target = "generated\com\example\binderdemo\IAsyncWorker.java" },
            @{ Source = "build\generated\com\example\binderdemo\ICalculator.java"; Target = "generated\com\example\binderdemo\ICalculator.java" },
            @{ Source = "build\generated\com\example\binderdemo\IResultCallback.java"; Target = "generated\com\example\binderdemo\IResultCallback.java" },
            @{ Source = "build\generated\com\example\binderdemo\ISyncResultCallback.java"; Target = "generated\com\example\binderdemo\ISyncResultCallback.java" },
            @{ Source = "build\verification-provenance.txt"; Target = "verification-provenance.txt" },
            @{ Source = "build\artifact-manifest.sha256"; Target = "artifact-manifest.sha256" }
          )
          foreach ($file in $packageFiles) {
            if (-not (Test-Path -LiteralPath $file.Source -PathType Leaf)) {
              throw "Release package input is missing: $($file.Source)"
            }
            $destination = Join-Path $packageRoot $file.Target
            New-Item -ItemType Directory -Path (Split-Path -Parent $destination) -Force | Out-Null
            Copy-Item -LiteralPath $file.Source -Destination $destination
          }

          $archive = Join-Path $releaseRoot "BinderLab-$releaseVersion-verification.zip"
          Compress-Archive `
            -Path (Join-Path $packageRoot "*") `
            -DestinationPath $archive `
            -CompressionLevel Optimal
          Copy-Item `
            -LiteralPath "build\verification-provenance.txt" `
            -Destination (Join-Path $releaseRoot "verification-provenance.txt")
          Copy-Item `
            -LiteralPath "build\artifact-manifest.sha256" `
            -Destination (Join-Path $releaseRoot "artifact-manifest.sha256")
          foreach ($asset in @(
              $archive,
              (Join-Path $releaseRoot "verification-provenance.txt"),
              (Join-Path $releaseRoot "artifact-manifest.sha256")
            )) {
            if (-not (Test-Path -LiteralPath $asset -PathType Leaf) -or
                (Get-Item -LiteralPath $asset).Length -eq 0) {
              throw "Release asset was not staged correctly: $asset"
            }
          }
          "RELEASE_VERSION=$releaseVersion" >> $env:GITHUB_ENV

      - name: Create or verify policy-protected annotated tag
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.releaseTag }}
          RELEASE_COMMIT: ${{ inputs.releaseCommit }}
        run: |
          & git fetch origin "+refs/tags/${env:RELEASE_TAG}:refs/tags/${env:RELEASE_TAG}" 2>$null
          if ($LASTEXITCODE -eq 0) {
            $type = (& git cat-file -t "refs/tags/$env:RELEASE_TAG").Trim()
            $target = (& git rev-list -n 1 "refs/tags/$env:RELEASE_TAG").Trim()
            if ($type -ne "tag") {
              throw "$env:RELEASE_TAG exists but is not an annotated tag"
            }
            if ($target -ne $env:RELEASE_COMMIT) {
              throw "$env:RELEASE_TAG already exists at $target; published tags must not move"
            }
            Write-Host "$env:RELEASE_TAG already points to the requested commit"
            exit 0
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a $env:RELEASE_TAG -m "Android 16 QPR2 BinderLab evidence $env:RELEASE_TAG" $env:RELEASE_COMMIT
          git push origin "refs/tags/$env:RELEASE_TAG"
          if ($LASTEXITCODE -ne 0) {
            throw "Could not publish annotated tag $env:RELEASE_TAG"
          }

      - name: Verify and checkout published release tag
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.releaseTag }}
          RELEASE_COMMIT: ${{ inputs.releaseCommit }}
        run: |
          & git fetch origin "+refs/tags/${env:RELEASE_TAG}:refs/tags/${env:RELEASE_TAG}"
          if ($LASTEXITCODE -ne 0) {
            throw "Could not fetch the published release tag"
          }
          $type = (& git cat-file -t "refs/tags/$env:RELEASE_TAG").Trim()
          $target = (& git rev-list -n 1 "refs/tags/$env:RELEASE_TAG").Trim()
          if ($type -ne "tag" -or $target -ne $env:RELEASE_COMMIT) {
            throw "Published tag does not resolve to the verified release commit"
          }
          & git checkout --detach "refs/tags/$env:RELEASE_TAG"
          if ($LASTEXITCODE -ne 0 -or (& git rev-parse HEAD).Trim() -ne $env:RELEASE_COMMIT) {
            throw "Could not check out the published release tag"
          }

      - name: Upload tag-bound reproducibility artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: BinderLab-api36.1-${{ inputs.releaseTag }}-verification
          if-no-files-found: error
          path: |
            build/BinderLab-debug.apk
            build/apk-badging.txt
            build/toolchain.txt
            build/evidence-replay-report.json
            build/generated/com/example/binderdemo/IAsyncWorker.java
            build/generated/com/example/binderdemo/ICalculator.java
            build/generated/com/example/binderdemo/IResultCallback.java
            build/generated/com/example/binderdemo/ISyncResultCallback.java
            build/verification-provenance.txt
            build/artifact-manifest.sha256
            build/release/BinderLab-${{ env.RELEASE_VERSION }}-verification.zip
            build/release/verification-provenance.txt
            build/release/artifact-manifest.sha256

      - name: Publish durable GitHub Release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.releaseTag }}
        run: |
          $releaseRoot = Join-Path $PWD "build\release"
          $assets = @(
            (Join-Path $releaseRoot "BinderLab-$env:RELEASE_VERSION-verification.zip"),
            (Join-Path $releaseRoot "verification-provenance.txt"),
            (Join-Path $releaseRoot "artifact-manifest.sha256")
          )
          $notesPath = Join-Path "releases" "$env:RELEASE_TAG.md"
          & gh release view $env:RELEASE_TAG `
            --repo "${{ github.repository }}" `
            --json tagName *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          if (-not $releaseExists) {
            & gh release create $env:RELEASE_TAG `
              --repo "${{ github.repository }}" `
              --verify-tag `
              --title "$env:RELEASE_TAG" `
              --notes-file $notesPath `
              $assets[0] $assets[1] $assets[2]
            if ($LASTEXITCODE -ne 0) {
              throw "Could not create the durable GitHub Release"
            }
          }

          $downloadRoot = Join-Path $releaseRoot "downloaded"
          if (Test-Path -LiteralPath $downloadRoot) {
            Remove-Item -LiteralPath $downloadRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $downloadRoot -Force | Out-Null
          foreach ($asset in $assets) {
            $assetName = Split-Path -Leaf $asset
            & gh release download $env:RELEASE_TAG `
              --repo "${{ github.repository }}" `
              --pattern $assetName `
              --dir $downloadRoot
            if ($LASTEXITCODE -ne 0) {
              throw "Could not download durable release asset $assetName"
            }
            $downloaded = Join-Path $downloadRoot $assetName
            $localHash = (Get-FileHash -LiteralPath $asset -Algorithm SHA256).Hash
            $remoteHash = (Get-FileHash -LiteralPath $downloaded -Algorithm SHA256).Hash
            if ($localHash -cne $remoteHash) {
              throw "Durable release asset hash mismatch: $assetName"
            }
          }

      - name: Publish final release status
        if: ${{ always() && steps.pending.outcome == 'success' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          RELEASE_COMMIT: ${{ inputs.releaseCommit }}
        run: |
          $state = switch ($env:JOB_STATUS) {
            "success" { "success" }
            "cancelled" { "error" }
            default { "failure" }
          }
          $description = switch ($state) {
            "success" { "Tag, rebuild, replay, Actions artifact, and Release assets passed" }
            "error" { "BinderLab release verification was cancelled" }
            default { "BinderLab release verification failed"
            }
          }
          $headers = @{
            Accept = "application/vnd.github+json"
            Authorization = "Bearer $env:GH_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $body = @{
            state = $state
            target_url = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            description = $description
            context = "binderlab/release-verification"
          } | ConvertTo-Json
          $status = Invoke-RestMethod `
            -Method Post `
            -Uri "https://api.github.com/repos/${{ github.repository }}/statuses/$env:RELEASE_COMMIT" `
            -Headers $headers `
            -Body $body `
            -ContentType "application/json"
          if ($status.state -ne $state -or
              $status.context -ne "binderlab/release-verification") {
            throw "GitHub did not persist the expected release status"
          }
